name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check peer dependencies
        run: pnpm peers check

      - name: Build Angular web app for GitHub Pages
        run: pnpm --dir apps/web exec ng build --base-href=/profdocs-ai/

      - name: Build Astro docs for GitHub Pages
        env:
          GITHUB_PAGES: "true"
        run: pnpm --filter docs build

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist-pages
          mkdir -p dist-pages

          WEB_DIST="apps/web/dist/web"
          if [ -d "$WEB_DIST/browser" ]; then
            WEB_SOURCE="$WEB_DIST/browser"
          else
            WEB_SOURCE="$WEB_DIST"
          fi

          cp -R "$WEB_SOURCE"/. dist-pages/

          mkdir -p dist-pages/docs
          cp -R apps/docs/dist/. dist-pages/docs/

          # GitHub Pages fallback for Angular client-side routes.
          cp dist-pages/index.html dist-pages/404.html

          echo "Prepared deployment artifact:"
          find dist-pages -maxdepth 2 -type f | sort | head -80

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
